<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 1 Polish - Tests</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { color: #f0f0f0; margin-bottom: 4px; }
    .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
    #summary {
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 24px;
      font-size: 18px;
      font-weight: 700;
    }
    .summary-pass { background: #1b4332; color: #52b788; border: 1px solid #2d6a4f; }
    .summary-fail { background: #3d0814; color: #ff6b6b; border: 1px solid #6b1525; }
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #a0c4ff;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
    }
    .test {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 13px;
      line-height: 1.4;
    }
    .test-pass { background: rgba(82, 183, 136, 0.08); }
    .test-fail { background: rgba(255, 107, 107, 0.08); }
    .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .pass-icon { color: #52b788; }
    .fail-icon { color: #ff6b6b; }
    .test-name { color: #ccc; }
    .test-detail { color: #888; font-size: 11px; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>Phase 1 Polish Tests</h1>
  <div class="subtitle">Durian Merge - structural & integration checks</div>
  <div id="summary"></div>
  <div id="results"></div>

  <script>
    // =====================================================
    // Test runner
    // =====================================================
    const results = [];
    let currentSection = '';

    function section(name) { currentSection = name; }

    function assert(name, condition, detail) {
      results.push({
        section: currentSection,
        name,
        pass: !!condition,
        detail: detail || '',
      });
    }

    function render() {
      const passed = results.filter(r => r.pass).length;
      const failed = results.filter(r => !r.pass).length;
      const total = results.length;

      const sumEl = document.getElementById('summary');
      if (failed === 0) {
        sumEl.className = 'summary-pass';
        sumEl.textContent = `All ${total} tests passed`;
      } else {
        sumEl.className = 'summary-fail';
        sumEl.textContent = `${failed} failed, ${passed} passed (${total} total)`;
      }

      // Group by section
      const sections = {};
      results.forEach(r => {
        if (!sections[r.section]) sections[r.section] = [];
        sections[r.section].push(r);
      });

      let html = '';
      for (const [sec, tests] of Object.entries(sections)) {
        html += `<div class="section"><div class="section-title">${sec}</div>`;
        for (const t of tests) {
          const cls = t.pass ? 'test-pass' : 'test-fail';
          const icon = t.pass
            ? '<span class="icon pass-icon">&#x2713;</span>'
            : '<span class="icon fail-icon">&#x2717;</span>';
          const detail = t.detail ? `<div class="test-detail">${t.detail}</div>` : '';
          html += `<div class="test ${cls}">${icon}<div><span class="test-name">${t.name}</span>${detail}</div></div>`;
        }
        html += '</div>';
      }
      document.getElementById('results').innerHTML = html;
    }

    // =====================================================
    // Fetch source files as text
    // =====================================================
    async function fetchText(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(res.status);
        return await res.text();
      } catch (e) {
        return null;
      }
    }

    async function runTests() {

      // ----- Fetch source files -----
      const [indexSrc, gameSrc, uiSrc, cssSrc, firebaseSrc] = await Promise.all([
        fetchText('index.html'),
        fetchText('js/game.js'),
        fetchText('js/ui.js'),
        fetchText('css/style.css'),
        fetchText('js/firebase-leaderboard.js'),
      ]);

      // ===========================================================
      // 1) Firebase Leaderboard Module
      // ===========================================================
      section('Firebase Leaderboard Module');

      assert(
        'firebase-leaderboard.js is loadable',
        firebaseSrc !== null,
        'File should be fetchable from js/firebase-leaderboard.js'
      );

      assert(
        'FirebaseLeaderboard IIFE is defined',
        firebaseSrc && firebaseSrc.includes('const FirebaseLeaderboard'),
        'Source should declare const FirebaseLeaderboard'
      );

      const fbExports = ['init', 'isAvailable', 'getCountry', 'countryFlag', 'submitScore', 'getScores'];
      const fbReturnMatch = firebaseSrc ? firebaseSrc.match(/return\s*\{([^}]+)\}/) : null;
      const fbReturnBlock = fbReturnMatch ? fbReturnMatch[1] : '';

      for (const fn of fbExports) {
        assert(
          `Exports function: ${fn}`,
          fbReturnBlock.includes(fn),
          `return block should include "${fn}"`
        );
      }

      // countryFlag logic test (parse the function and test manually)
      // We can evaluate the pure function since it has no side effects
      assert(
        'countryFlag function exists in source',
        firebaseSrc && firebaseSrc.includes('function countryFlag(code)'),
        'Should define countryFlag(code)'
      );

      // Extract and eval countryFlag for direct testing
      let countryFlagFn = null;
      try {
        // Safe extraction: the function is pure math with no side effects
        const fnMatch = firebaseSrc.match(/function countryFlag\(code\)\s*\{[\s\S]*?return String\.fromCodePoint[\s\S]*?\}/);
        if (fnMatch) {
          countryFlagFn = new Function('code', `
            if (!code || code.length !== 2) return '\\u{1F30D}';
            const offset = 127397;
            return String.fromCodePoint(
              code.charCodeAt(0) + offset,
              code.charCodeAt(1) + offset
            );
          `);
        }
      } catch (e) { /* fallback */ }

      if (countryFlagFn) {
        assert(
          "countryFlag('KR') returns Korean flag",
          countryFlagFn('KR') === '\u{1F1F0}\u{1F1F7}',
          `Got: "${countryFlagFn('KR')}"`
        );
        assert(
          "countryFlag('US') returns US flag",
          countryFlagFn('US') === '\u{1F1FA}\u{1F1F8}',
          `Got: "${countryFlagFn('US')}"`
        );
        assert(
          "countryFlag('') returns globe",
          countryFlagFn('') === '\u{1F30D}',
          `Got: "${countryFlagFn('')}"`
        );
      } else {
        assert("countryFlag('KR') returns Korean flag", false, 'Could not extract function');
        assert("countryFlag('US') returns US flag", false, 'Could not extract function');
        assert("countryFlag('') returns globe", false, 'Could not extract function');
      }

      // ===========================================================
      // 2) index.html Structure
      // ===========================================================
      section('index.html Structure');

      assert(
        'Firebase App CDN script referenced',
        indexSrc && indexSrc.includes('firebase-app-compat.js'),
        'Should load firebase-app-compat.js from CDN'
      );
      assert(
        'Firebase Firestore CDN script referenced',
        indexSrc && indexSrc.includes('firebase-firestore-compat.js'),
        'Should load firebase-firestore-compat.js from CDN'
      );
      assert(
        'firebase-leaderboard.js script tag exists',
        indexSrc && indexSrc.includes('js/firebase-leaderboard.js'),
        'Should have <script src="js/firebase-leaderboard.js">'
      );

      // Tutorial DOM elements
      assert(
        'tutorialOverlay element exists in HTML',
        indexSrc && indexSrc.includes('id="tutorialOverlay"'),
        'Should have <div id="tutorialOverlay">'
      );
      assert(
        'tutorialMsg element exists in HTML',
        indexSrc && indexSrc.includes('id="tutorialMsg"'),
        'Should have element with id="tutorialMsg"'
      );
      assert(
        'tutorialHand element exists in HTML',
        indexSrc && indexSrc.includes('id="tutorialHand"'),
        'Should have element with id="tutorialHand"'
      );

      // Leaderboard tabs
      assert(
        'Leaderboard tab: alltime',
        indexSrc && indexSrc.includes('data-tab="alltime"'),
        'Should have a tab with data-tab="alltime"'
      );
      assert(
        'Leaderboard tab: weekly',
        indexSrc && indexSrc.includes('data-tab="weekly"'),
        'Should have a tab with data-tab="weekly"'
      );
      assert(
        'Leaderboard tab: country',
        indexSrc && indexSrc.includes('data-tab="country"'),
        'Should have a tab with data-tab="country"'
      );

      // Script load order: firebase-leaderboard before game.js
      if (indexSrc) {
        const fbIdx = indexSrc.indexOf('firebase-leaderboard.js');
        const gameIdx = indexSrc.indexOf('js/game.js');
        assert(
          'firebase-leaderboard.js loaded before game.js',
          fbIdx > 0 && gameIdx > 0 && fbIdx < gameIdx,
          `firebase-leaderboard at ${fbIdx}, game.js at ${gameIdx}`
        );
      }

      // ===========================================================
      // 3) game.js - New Effect Variables
      // ===========================================================
      section('game.js - Effect Variables');

      assert(
        'scorePopups array declared',
        gameSrc && gameSrc.includes('let scorePopups = []'),
        'Should have let scorePopups = []'
      );
      assert(
        'shakeIntensity declared',
        gameSrc && gameSrc.includes('let shakeIntensity = 0'),
        'Should have let shakeIntensity = 0'
      );
      assert(
        'dropTrails array declared',
        gameSrc && gameSrc.includes('let dropTrails = []'),
        'Should have let dropTrails = []'
      );
      assert(
        'comboBorderAlpha declared',
        gameSrc && gameSrc.includes('let comboBorderAlpha = 0'),
        'Should have let comboBorderAlpha = 0'
      );
      assert(
        'trailFrame counter declared',
        gameSrc && /let trailFrame\s*=\s*0/.test(gameSrc),
        'Should have let trailFrame = 0'
      );

      // ===========================================================
      // 4) game.js - Merge Effects with Glow & Particles
      // ===========================================================
      section('game.js - Enhanced Merge Effects');

      assert(
        'mergeEffects array declared',
        gameSrc && gameSrc.includes('let mergeEffects = []'),
        'Should have let mergeEffects = []'
      );
      assert(
        'mergeEffects.push includes glowRadius',
        gameSrc && /mergeEffects\.push\(\{[\s\S]*?glowRadius/.test(gameSrc),
        'mergeEffects.push({...glowRadius...})'
      );
      assert(
        'mergeEffects.push includes particles array',
        gameSrc && /mergeEffects\.push\(\{[\s\S]*?particles/.test(gameSrc),
        'mergeEffects.push({...particles...})'
      );
      assert(
        '12 particles generated per merge',
        gameSrc && gameSrc.includes('i < 12'),
        'Particle loop should iterate 12 times'
      );
      assert(
        'Glow radial gradient in render',
        gameSrc && gameSrc.includes('createRadialGradient') && gameSrc.includes('effect.glowRadius'),
        'Render should use createRadialGradient with glowRadius'
      );
      assert(
        'Particle rendering loop',
        gameSrc && /for\s*\(const p of effect\.particles\)/.test(gameSrc),
        'Should iterate effect.particles in render'
      );

      // ===========================================================
      // 5) game.js - Screen Shake
      // ===========================================================
      section('game.js - Screen Shake');

      assert(
        'Screen shake triggered for high-level merges',
        gameSrc && /if\s*\(level\s*>=\s*4\)/.test(gameSrc) && gameSrc.includes('shakeIntensity'),
        'Should set shakeIntensity when level >= 4'
      );
      assert(
        'Shake uses ctx.translate in render',
        gameSrc && /ctx\.translate\(sx,\s*sy\)/.test(gameSrc),
        'Render should apply shake via ctx.translate(sx, sy)'
      );
      assert(
        'Shake decays over time',
        gameSrc && /shakeIntensity\s*-=/.test(gameSrc),
        'shakeIntensity should decrease each frame'
      );
      assert(
        'ctx.save/restore wraps shake',
        gameSrc && gameSrc.includes("if (shakeIntensity > 0) {\n      ctx.save()") &&
        gameSrc.includes("if (shakeIntensity > 0) {\n      ctx.restore()"),
        'Should save/restore around shake transform'
      );

      // ===========================================================
      // 6) game.js - Score Popups
      // ===========================================================
      section('game.js - Score Popups');

      assert(
        'scorePopups.push on merge',
        gameSrc && /scorePopups\.push\(\{/.test(gameSrc),
        'Should push to scorePopups when merging'
      );
      assert(
        'Score popup has text field with + prefix',
        gameSrc && gameSrc.includes("text: '+' + points"),
        "Should format as '+' + points"
      );
      assert(
        'Score popup rendering (fillText)',
        gameSrc && /for\s*\(const pop of scorePopups\)/.test(gameSrc),
        'Render loop should iterate scorePopups'
      );
      assert(
        'Score popup gold color',
        gameSrc && gameSrc.includes("'#FFD700'") && gameSrc.includes('pop.text'),
        'Should render in gold (#FFD700)'
      );
      assert(
        'Score popups decay',
        gameSrc && /scorePopups\[i\]\.alpha\s*-=/.test(gameSrc),
        'Alpha should decrease each frame'
      );

      // ===========================================================
      // 7) game.js - Drop Trails
      // ===========================================================
      section('game.js - Drop Trails');

      assert(
        'dropTrails generated during gameplay',
        gameSrc && /dropTrails\.push\(\{/.test(gameSrc),
        'Should push trail particles'
      );
      assert(
        'Trail particles rendered',
        gameSrc && /for\s*\(const t of dropTrails\)/.test(gameSrc),
        'Render should iterate dropTrails'
      );
      assert(
        'Trail particles decay',
        gameSrc && /dropTrails\[i\]\.alpha\s*-=/.test(gameSrc),
        'Trail alpha should decrease'
      );
      assert(
        'Trail generation throttled (every 3 frames)',
        gameSrc && gameSrc.includes('trailFrame % 3'),
        'Should only generate trails every 3rd frame'
      );

      // ===========================================================
      // 8) game.js - Combo Border Pulse
      // ===========================================================
      section('game.js - Combo Border Pulse');

      assert(
        'comboBorderAlpha set on combo',
        gameSrc && /comboBorderAlpha\s*=\s*0\.6/.test(gameSrc),
        'Should set to 0.6 on combo'
      );
      assert(
        'Combo border rendered as strokeRect',
        gameSrc && gameSrc.includes('comboBorderAlpha > 0') && gameSrc.includes('strokeRect'),
        'Should draw border rectangle when alpha > 0'
      );
      assert(
        'Combo border decays',
        gameSrc && /comboBorderAlpha\s*-=/.test(gameSrc),
        'comboBorderAlpha should decrease each frame'
      );
      assert(
        'Combo border uses gold color',
        gameSrc && gameSrc.includes('rgba(255, 215, 0,') && gameSrc.includes('comboBorderAlpha'),
        'Should use gold rgba with comboBorderAlpha'
      );

      // ===========================================================
      // 9) game.js - Squash & Stretch
      // ===========================================================
      section('game.js - Squash & Stretch');

      assert(
        'squashX calculation exists',
        gameSrc && /const squashX\s*=/.test(gameSrc),
        'Should calculate squashX based on velocity'
      );
      assert(
        'squashY calculation exists',
        gameSrc && /const squashY\s*=/.test(gameSrc),
        'Should calculate squashY based on velocity'
      );
      assert(
        'ctx.scale(squashX, squashY) applied',
        gameSrc && gameSrc.includes('ctx.scale(squashX, squashY)'),
        'Should apply squash/stretch via ctx.scale'
      );
      assert(
        'Squash triggered above speed threshold',
        gameSrc && gameSrc.includes('speed > 3'),
        'Should only squash when speed > 3'
      );

      // ===========================================================
      // 10) game.js - resetGame clears new variables
      // ===========================================================
      section('game.js - Reset Clears New Effects');

      const resetMatch = gameSrc ? gameSrc.match(/function resetGame\(\)\s*\{([\s\S]*?)\n  \}/) : null;
      const resetBody = resetMatch ? resetMatch[1] : '';

      assert(
        'resetGame clears scorePopups',
        resetBody.includes('scorePopups = []'),
        'Should reset scorePopups to []'
      );
      assert(
        'resetGame clears shakeIntensity',
        resetBody.includes('shakeIntensity = 0'),
        'Should reset shakeIntensity to 0'
      );
      assert(
        'resetGame clears dropTrails',
        resetBody.includes('dropTrails = []'),
        'Should reset dropTrails to []'
      );
      assert(
        'resetGame clears comboBorderAlpha',
        resetBody.includes('comboBorderAlpha = 0'),
        'Should reset comboBorderAlpha to 0'
      );

      // ===========================================================
      // 11) game.js - Firebase Integration
      // ===========================================================
      section('game.js - Firebase Integration');

      assert(
        'FirebaseLeaderboard.init called in game init',
        gameSrc && gameSrc.includes('FirebaseLeaderboard.init('),
        'Should initialize Firebase in Game.init()'
      );
      assert(
        'FirebaseLeaderboard.submitScore called on game over',
        gameSrc && gameSrc.includes('FirebaseLeaderboard.submitScore('),
        'Should submit score to Firebase on game over'
      );
      assert(
        'FirebaseLeaderboard.isAvailable check before submit',
        gameSrc && gameSrc.includes('FirebaseLeaderboard.isAvailable()'),
        'Should check availability before submitting'
      );

      // ===========================================================
      // 12) ui.js - Tutorial Functions
      // ===========================================================
      section('ui.js - Tutorial');

      assert(
        'showTutorial function defined',
        uiSrc && uiSrc.includes('function showTutorial()'),
        'Should define showTutorial()'
      );
      assert(
        'advanceTutorial function defined',
        uiSrc && uiSrc.includes('function advanceTutorial()'),
        'Should define advanceTutorial()'
      );
      assert(
        'showTutorial exported in return',
        uiSrc && /return\s*\{[\s\S]*showTutorial[\s\S]*\}/.test(uiSrc),
        'UI module return should include showTutorial'
      );
      assert(
        'advanceTutorial exported in return',
        uiSrc && /return\s*\{[\s\S]*advanceTutorial[\s\S]*\}/.test(uiSrc),
        'UI module return should include advanceTutorial'
      );
      assert(
        'Tutorial checks localStorage durianMergeTutorialDone',
        uiSrc && uiSrc.includes('durianMergeTutorialDone'),
        'Should check/set durianMergeTutorialDone key'
      );
      assert(
        'Tutorial has 2 steps',
        uiSrc && uiSrc.includes('tutorialStep = 1') && uiSrc.includes('tutorialStep === 1') && uiSrc.includes('tutorialStep = 2'),
        'Should manage tutorialStep 1 and 2'
      );
      assert(
        'Tutorial step 1 shows drag message',
        uiSrc && uiSrc.includes('\uC88C\uC6B0\uB85C \uB4DC\uB798\uADF8'),
        'Step 1 message should mention dragging'
      );

      // ===========================================================
      // 13) ui.js - Leaderboard uses Firebase
      // ===========================================================
      section('ui.js - Firebase Leaderboard Integration');

      assert(
        'renderLeaderboardFull is async',
        uiSrc && uiSrc.includes('async function renderLeaderboardFull'),
        'Should be async for Firebase await'
      );
      assert(
        'renderLeaderboardFull calls FirebaseLeaderboard.getScores',
        uiSrc && uiSrc.includes('FirebaseLeaderboard.getScores('),
        'Should fetch scores from Firebase'
      );
      assert(
        'renderLeaderboardFull calls FirebaseLeaderboard.countryFlag',
        uiSrc && uiSrc.includes('FirebaseLeaderboard.countryFlag('),
        'Should display country flags'
      );
      assert(
        'Shows loading state while fetching',
        uiSrc && uiSrc.includes('Loading...'),
        'Should show loading text during fetch'
      );
      assert(
        'Falls back to local RankingManager',
        uiSrc && uiSrc.includes('RankingManager.getTopScores'),
        'Should fallback to local scores if Firebase empty'
      );

      // ===========================================================
      // 14) ui.js - Tutorial DOM caching
      // ===========================================================
      section('ui.js - Tutorial DOM Elements Cached');

      assert(
        'tutorial overlay cached as els.tutorial',
        uiSrc && uiSrc.includes("tutorial: document.getElementById('tutorialOverlay')"),
        'Should cache tutorialOverlay element'
      );
      assert(
        'tutorialMsg cached',
        uiSrc && uiSrc.includes("tutorialMsg: document.getElementById('tutorialMsg')"),
        'Should cache tutorialMsg element'
      );
      assert(
        'tutorialHand cached',
        uiSrc && uiSrc.includes("tutorialHand: document.getElementById('tutorialHand')"),
        'Should cache tutorialHand element'
      );

      // ===========================================================
      // 15) CSS - Tutorial Styles
      // ===========================================================
      section('CSS - Tutorial Styles');

      assert(
        '.tutorial-overlay style defined',
        cssSrc && cssSrc.includes('.tutorial-overlay'),
        'Should have .tutorial-overlay rule'
      );
      assert(
        '.tutorial-msg style defined',
        cssSrc && cssSrc.includes('.tutorial-msg'),
        'Should have .tutorial-msg rule'
      );
      assert(
        '.tutorial-hand style defined',
        cssSrc && cssSrc.includes('.tutorial-hand'),
        'Should have .tutorial-hand rule'
      );
      assert(
        'Tutorial overlay z-index > HUD',
        cssSrc && /\.tutorial-overlay[\s\S]*?z-index:\s*18/.test(cssSrc),
        'z-index should be 18 (above HUD at 15)'
      );
      assert(
        '@keyframes tutorialSwipe animation defined',
        cssSrc && cssSrc.includes('@keyframes tutorialSwipe'),
        'Should define swipe animation for tutorial hand'
      );
      assert(
        'Tutorial overlay is pointer-events: none',
        cssSrc && /\.tutorial-overlay[\s\S]*?pointer-events:\s*none/.test(cssSrc),
        'Should not block gameplay input'
      );

      // ===========================================================
      // 16) game.js - Render function references all systems
      // ===========================================================
      section('game.js - Render Function Completeness');

      const renderMatch = gameSrc ? gameSrc.match(/function render\(\)\s*\{([\s\S]*?)\n  \}(?=\n)/) : null;
      const renderBody = renderMatch ? renderMatch[1] : '';

      assert(
        'Render references shakeIntensity',
        renderBody.includes('shakeIntensity'),
        'Should apply screen shake in render'
      );
      assert(
        'Render references dropTrails',
        renderBody.includes('dropTrails'),
        'Should draw drop trails in render'
      );
      assert(
        'Render references mergeEffects',
        renderBody.includes('mergeEffects'),
        'Should draw merge effects in render'
      );
      assert(
        'Render references scorePopups',
        renderBody.includes('scorePopups'),
        'Should draw score popups in render'
      );
      assert(
        'Render references comboBorderAlpha',
        renderBody.includes('comboBorderAlpha'),
        'Should draw combo border in render'
      );
      assert(
        'Render references squashX / squashY',
        renderBody.includes('squashX') && renderBody.includes('squashY'),
        'Should apply squash/stretch to fruits in render'
      );

      // ===========================================================
      // 17) game.js - advanceTutorial called on drop
      // ===========================================================
      section('game.js - Tutorial Trigger');

      assert(
        'UI.advanceTutorial() called in dropFruit',
        gameSrc && /function dropFruit[\s\S]*?UI\.advanceTutorial\(\)/.test(gameSrc),
        'Should advance tutorial when fruit is dropped'
      );
      assert(
        'UI.showTutorial() called in startGame',
        gameSrc && /function startGame[\s\S]*?UI\.showTutorial\(\)/.test(gameSrc),
        'Should show tutorial when game starts'
      );

      // ===========================================================
      // Done
      // ===========================================================
      render();
    }

    runTests();
  </script>
</body>
</html>
